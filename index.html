<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Chinnodu Name Reveal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Noto+Serif+Devanagari:wght@600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --maroon:#5c0a0a;
    --deep:#3d0606;
    --saffron:#e07a1f;
    --marigold:#f0a020;
    --gold:#e8c547;
    --ivory:#fff4e0;
    --cream:#ffe8c2;
}

html{
    height:100%;
    height:100dvh;
    overflow:hidden;
    overscroll-behavior:none;
}

body{
    height:100%;
    height:100dvh;
    max-height:100dvh;
    width:100%;
    max-width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    overscroll-behavior:none;
    color:var(--ivory);
    font-family:"Cormorant Garamond",serif;
    background:
        radial-gradient(ellipse 80% 60% at 50% 40%, rgba(224,122,31,.35) 0%, transparent 55%),
        radial-gradient(ellipse 50% 40% at 20% 80%, rgba(92,10,10,.5) 0%, transparent 50%),
        radial-gradient(ellipse 50% 40% at 85% 15%, rgba(240,160,32,.25) 0%, transparent 45%),
        linear-gradient(160deg, #2a0505 0%, #6b1010 35%, #a84810 70%, #c47820 100%);
}

/* Subtle rangoli dots (static — animating background-position causes jank) */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background-image:
        radial-gradient(circle, rgba(232,197,71,.18) 1.5px, transparent 1.5px);
    background-size:28px 28px;
    pointer-events:none;
    z-index:0;
}

/* —— Toran (mango leaf garland) —— */
.toran{
    position:fixed;
    top:0;
    left:0;
    right:0;
    height:70px;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    gap:2px;
    z-index:5;
    pointer-events:none;
    padding-top:4px;
}

.toran-rope{
    position:absolute;
    top:10px;
    left:5%;
    right:5%;
    height:4px;
    background:linear-gradient(90deg, transparent, var(--gold), var(--marigold), var(--gold), transparent);
    border-radius:2px;
    box-shadow:0 1px 6px rgba(232,197,71,.5);
}

.leaf{
    width:22px;
    height:36px;
    background:linear-gradient(180deg, #2d6a2d 0%, #1a4a1a 100%);
    border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;
    transform-origin:top center;
    position:relative;
    margin-top:8px;
}

.leaf::after{
    content:"";
    position:absolute;
    top:4px;
    left:50%;
    width:1.5px;
    height:70%;
    background:rgba(255,255,200,.25);
    transform:translateX(-50%);
}

/* Only a few leaves sway — keeps motion light */
.leaf:nth-child(6n){
    animation:leafSway 4s ease-in-out infinite;
}

.leaf:nth-child(even){
    background:linear-gradient(180deg, #3a8a3a 0%, #226022 100%);
}

@keyframes leafSway{
    0%,100%{ transform:rotate(-6deg); }
    50%{ transform:rotate(6deg); }
}

.marigold-bead{
    width:14px;
    height:14px;
    border-radius:50%;
    background:radial-gradient(circle at 35% 35%, #ffd060, #e07a1f 55%, #b85010);
    margin-top:6px;
}

/* —— Floating diyas —— */
.diya-field{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    pointer-events:none;
    z-index:1;
    overflow:hidden;
}

.diya{
    position:absolute;
    bottom:-20px;
    width:28px;
    height:18px;
    opacity:0;
    animation:diyaRise 12s ease-in infinite;
}

.diya-bowl{
    position:absolute;
    bottom:0;
    left:0;
    right:0;
    height:10px;
    background:linear-gradient(180deg, #c47820, #8b4510);
    border-radius:0 0 50% 50% / 0 0 100% 100%;
    box-shadow:0 2px 6px rgba(0,0,0,.3);
}

.diya-flame{
    position:absolute;
    bottom:8px;
    left:50%;
    width:8px;
    height:16px;
    margin-left:-4px;
    background:radial-gradient(ellipse at 50% 80%, #fff8e0 0%, #ffd060 30%, #ff6b00 70%, transparent 100%);
    border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;
    animation:flameFlicker 1.2s ease-in-out infinite alternate;
}

@keyframes flameFlicker{
    from{ transform:scale3d(1,1,1); opacity:.85; }
    to{ transform:scale3d(.9,1.12,1); opacity:1; }
}

@keyframes diyaRise{
    0%{
        opacity:0;
        transform:translate3d(0,0,0) scale(.6);
    }
    10%{ opacity:.8; }
    85%{ opacity:.65; }
    100%{
        opacity:0;
        transform:translate3d(0,-110vh,0) scale(1);
    }
}

/* —— Marigold petals —— */
.petal{
    position:absolute;
    top:-40px;
    width:16px;
    height:20px;
    background:radial-gradient(ellipse at 40% 40%, #ffd060, #e07a1f 60%, #c45010);
    border-radius:50% 50% 50% 0;
    opacity:.85;
    z-index:2;
    pointer-events:none;
    animation:petalFall linear infinite;
    will-change:transform, opacity;
    backface-visibility:hidden;
}

@keyframes petalFall{
    0%{
        transform:translate3d(0,0,0) rotate(0deg);
        opacity:0;
    }
    10%{ opacity:.9; }
    100%{
        transform:translate3d(30px,110vh,0) rotate(360deg);
        opacity:.25;
    }
}

/* —— Start screen —— */
.start-screen{
    position:relative;
    z-index:10;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    width:100%;
    max-width:520px;
    max-height:100dvh;
    padding:70px 16px 40px;
    text-align:center;
    animation:fadeIn .8s ease;
    overflow:hidden;
}

.start-screen.is-hidden{
    display:none;
}

/* Full-opacity Ganesh on first page */
.ganesh-img{
    width:min(340px, 72vw);
    height:auto;
    display:block;
    margin:0 auto 12px;
    filter:drop-shadow(0 8px 24px rgba(0,0,0,.4));
    transition:opacity .7s ease, transform .7s ease, width .7s ease, filter .7s ease;
    opacity:1;
    position:relative;
    z-index:2;
}

/* After reveal — transparent Ganesh, fully visible and centered */
body.is-revealed .ganesh-img{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    width:auto;
    height:auto;
    max-width:min(440px, 88%);
    max-height:min(460px, 62vh);
    margin:0;
    opacity:.28;
    filter:none;
    z-index:0;
    pointer-events:none;
    display:block;
    object-fit:contain;
}

.start{
    text-align:center;
    position:relative;
    z-index:10;
    width:100%;
}

@keyframes fadeIn{
    from{ opacity:0; }
    to{ opacity:1; }
}

.start h1{
    font-family:"Cinzel",serif;
    font-size:clamp(22px, 4vw, 34px);
    font-weight:500;
    color:var(--cream);
    margin-bottom:14px;
    margin-top:4px;
    letter-spacing:.04em;
    text-shadow:0 2px 20px rgba(0,0,0,.4);
    line-height:1.4;
}

.start .hearts{
    display:block;
    font-size:18px;
    color:var(--marigold);
    margin-bottom:12px;
    letter-spacing:8px;
    animation:heartBeat 1.6s ease-in-out infinite;
}

@keyframes heartBeat{
    0%,100%{ transform:scale(1); opacity:.7; }
    50%{ transform:scale(1.1); opacity:1; }
}

button.reveal-btn{
    padding:16px 40px;
    border:1.5px solid var(--gold);
    border-radius:999px;
    font-family:"Cinzel",serif;
    font-size:16px;
    letter-spacing:.12em;
    background:linear-gradient(180deg, var(--gold) 0%, var(--saffron) 100%);
    color:var(--deep);
    font-weight:700;
    cursor:pointer;
    box-shadow:
        0 4px 0 #8b4510,
        0 8px 24px rgba(0,0,0,.35);
    transition:transform .2s, box-shadow .2s;
    position:relative;
    overflow:hidden;
    margin-bottom:8px;
}

button.reveal-btn::after{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(105deg, transparent 40%, rgba(255,255,255,.35) 50%, transparent 60%);
    transform:translateX(-100%);
    animation:shimmer 3s ease-in-out infinite;
}

@keyframes shimmer{
    0%,60%{ transform:translateX(-100%); }
    100%{ transform:translateX(100%); }
}

button.reveal-btn:hover{
    transform:translateY(-2px);
    box-shadow:
        0 6px 0 #8b4510,
        0 12px 28px rgba(0,0,0,.4);
}

button.reveal-btn:active{
    transform:translateY(2px);
    box-shadow:0 2px 0 #8b4510, 0 4px 12px rgba(0,0,0,.3);
}

/* —— Reveal —— */
.reveal{
    display:none;
    text-align:center;
    position:relative;
    z-index:20;
    padding:72px 12px 20px;
    max-width:560px;
    width:94%;
    max-height:100dvh;
    overflow:hidden;
    box-sizing:border-box;
}

.reveal.show{
    display:block;
    animation:cardReveal .85s ease forwards;
}

@keyframes cardReveal{
    from{ opacity:0; }
    to{ opacity:1; }
}

/* Transparent Ganesh stage */
.reveal-hero{
    position:relative;
    width:100%;
    min-height:min(480px, 68vh);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    margin:0;
    padding-top:0;
    overflow:hidden;
}

/* Om — direct child of .reveal, pinned at TOP */
.reveal > .om-wrap{
    position:absolute !important;
    top:6px !important;
    left:50% !important;
    width:78px !important;
    height:78px !important;
    margin:0 0 0 -39px !important;
    z-index:50 !important;
    transform:none !important;
}

/* Text block — lower on the image */
.reveal-copy{
    position:relative;
    z-index:2;
    display:flex;
    flex-direction:column;
    align-items:center;
    width:100%;
    margin-top:0;
    padding:24px 8px 16px;
    justify-content:center;
}

.om-wrap{
    position:relative;
    display:inline-flex;
    justify-content:center;
    align-items:center;
    width:78px;
    height:78px;
    opacity:0;
    animation:omFade .7s .15s ease forwards;
}

@keyframes omFade{
    from{ opacity:0; }
    to{ opacity:1; }
}

.om-glow{
    position:absolute;
    inset:4px;
    border-radius:50%;
    background:radial-gradient(circle,
        rgba(255,240,180,.85) 0%,
        rgba(232,197,71,.55) 35%,
        rgba(224,122,31,.2) 60%,
        transparent 75%);
    z-index:0;
    animation:omGlowPulse 2.4s ease-in-out infinite;
}

.om-ring{
    position:absolute;
    inset:0;
    border-radius:50%;
    border:1.5px solid rgba(232,197,71,.45);
    z-index:0;
    animation:omRingExpand 2.8s ease-out infinite;
    pointer-events:none;
}

@keyframes omGlowPulse{
    0%,100%{
        transform:scale(.92);
        opacity:.65;
    }
    50%{
        transform:scale(1.18);
        opacity:1;
    }
}

@keyframes omRingExpand{
    0%{
        transform:scale(.85);
        opacity:.7;
    }
    100%{
        transform:scale(1.45);
        opacity:0;
    }
}

.om-svg{
    position:relative;
    z-index:2;
    width:70px;
    height:70px;
    filter:drop-shadow(0 0 10px rgba(232,197,71,.55));
}

.title{
    font-family:"Cormorant Garamond",serif;
    font-size:clamp(14px, 2.2vw, 17px);
    font-style:italic;
    color:var(--gold);
    letter-spacing:.08em;
    margin:0 0 8px;
    opacity:0;
    animation:riseIn .7s .25s ease forwards;
    text-shadow:0 1px 8px rgba(0,0,0,.45);
}

.name{
    font-family:"Noto Serif Devanagari","Cinzel",serif;
    font-size:clamp(30px, 6.5vw, 46px);
    font-weight:700;
    margin-top:8px;
    color:var(--ivory);
    letter-spacing:.02em;
    line-height:1.25;
    text-shadow:
        0 2px 4px rgba(0,0,0,.65),
        0 0 18px rgba(0,0,0,.4);
    opacity:0;
    animation:nameReveal .9s .4s cubic-bezier(.22,1,.36,1) forwards;
}

.name-en{
    font-family:"Cinzel",serif;
    font-size:clamp(13px, 2vw, 16px);
    color:rgba(255,232,194,.92);
    letter-spacing:.16em;
    text-transform:uppercase;
    margin-top:10px;
    opacity:0;
    animation:riseIn .7s .5s ease forwards;
    text-shadow:0 1px 8px rgba(0,0,0,.5);
}

@keyframes nameReveal{
    from{ opacity:0; transform:translateY(10px); }
    to{ opacity:1; transform:translateY(0); }
}

.message{
    font-size:clamp(16px, 2.6vw, 20px);
    margin-top:16px;
    color:var(--cream);
    opacity:0;
    animation:riseIn .7s .6s ease forwards;
    text-shadow:0 1px 8px rgba(0,0,0,.5);
}

.sparkles{
    display:inline-flex;
    gap:10px;
    align-items:center;
    color:var(--gold);
    font-size:.9em;
}

.sparkle{ opacity:.85; }

.meaning{
    font-size:clamp(12px, 1.9vw, 15px);
    margin-top:10px;
    color:rgba(255,244,224,.88);
    font-style:italic;
    line-height:1.5;
    max-width:380px;
    margin-left:auto;
    margin-right:auto;
    text-shadow:0 1px 8px rgba(0,0,0,.5);
}

.divider{
    width:90px;
    height:1px;
    margin:16px auto 0;
    background:linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity:0;
    animation:riseIn .7s .75s ease forwards;
}

.mother{
    font-family:"Cinzel",serif;
    font-size:clamp(14px, 2.3vw, 18px);
    margin-top:12px;
    color:var(--gold);
    letter-spacing:.14em;
    text-transform:uppercase;
    opacity:0;
    animation:riseIn .7s .85s ease forwards;
    text-shadow:0 1px 8px rgba(0,0,0,.45);
}

.mother .heart{
    display:inline-block;
    color:var(--gold);
    margin:0 8px;
    opacity:.75;
    animation:none;
}

@keyframes riseIn{
    from{
        opacity:0;
        transform:translateY(16px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.music-toggle{
    display:none;
    position:fixed;
    top:78px;
    right:18px;
    width:44px;
    height:44px;
    min-width:44px;
    min-height:44px;
    padding:0;
    margin:0;
    border:1px solid rgba(232,197,71,.5);
    border-radius:50%;
    background:rgba(61,6,6,.75);
    backdrop-filter:blur(8px);
    color:var(--gold);
    cursor:pointer;
    z-index:9999;
    transition:background .25s;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    flex-shrink:0;
    -webkit-tap-highlight-color:transparent;
    touch-action:manipulation;
}

.music-toggle svg{
    position:absolute;
    top:50%;
    left:50%;
    width:22px;
    height:22px;
    margin:0;
    transform:translate(-50%, -50%);
    pointer-events:none;
}

.music-toggle svg path{
    fill:none;
    stroke:currentColor;
    stroke-width:1.8;
    stroke-linecap:round;
    stroke-linejoin:round;
}

.music-toggle svg .spk{
    fill:currentColor;
    stroke:none;
}

.music-toggle .icon-on,
.music-toggle .icon-off{
    display:block;
    opacity:0;
}

.music-toggle .icon-on{ opacity:1; }
.music-toggle.is-muted .icon-on{ opacity:0; }
.music-toggle.is-muted .icon-off{ opacity:1; }

.music-toggle:hover,
.music-toggle:active{
    background:rgba(92,10,10,.9);
}

.music-toggle.visible{
    display:flex;
}

/* —— Side Bala Ganesh idols —— */
.side-ganesh{
    position:fixed;
    top:50%;
    transform:translateY(-50%);
    z-index:3;
    pointer-events:none;
    width:clamp(90px, 16vw, 150px);
}

.side-ganesh.left{ left:clamp(6px, 2.5vw, 24px); }
.side-ganesh.right{
    right:clamp(6px, 2.5vw, 24px);
    transform:translateY(-50%) scaleX(-1);
}

.side-ganesh img{
    width:100%;
    height:auto;
    display:block;
    filter:drop-shadow(0 4px 16px rgba(0,0,0,.4));
}

/* Corner paisleys */
.corner{
    position:fixed;
    width:80px;
    height:80px;
    opacity:.35;
    z-index:3;
    pointer-events:none;
}

.corner svg{ width:100%; height:100%; fill:var(--gold); }

.corner.tl{ top:60px; left:12px; }
.corner.tr{ top:60px; right:12px; transform:scaleX(-1); }
.corner.bl{ bottom:12px; left:12px; transform:scaleY(-1); }
.corner.br{ bottom:12px; right:12px; transform:scale(-1); }

@media (max-width:768px){
    .toran{ height:50px; }
    .leaf{ width:14px; height:24px; }
    .marigold-bead{ width:10px; height:10px; }
    .corner{ width:48px; height:48px; }
    .music-toggle{ top:58px; right:10px; width:40px; height:40px; }
    .music-toggle svg{ width:20px; height:20px; }
    .side-ganesh{ width:70px; top:42%; }

    .start-screen{
        padding:50px 14px 36px;
        justify-content:center;
        max-height:100dvh;
        height:100%;
        overflow:hidden;
        width:100%;
    }

    .ganesh-img{
        width:min(210px, 54vw);
        margin-bottom:4px;
        flex-shrink:1;
    }

    body.is-revealed .ganesh-img{
        top:45%;
        left:50%;
        transform:translate(-50%, -50%);
        max-width:98vw;
        max-height:68vh;
        width:98vw;
        opacity:.3;
    }

    .reveal{
        padding:52px 8px 12px;
        overflow:hidden;
    }

    .reveal-hero{
        min-height:min(550px, 78vh);
        padding-top:0;
        justify-content:center;
    }

    .reveal-copy{
        margin-top:0;
        padding:12px 8px 10px;
    }

    .reveal > .om-wrap{
        top:4px !important;
        width:64px !important;
        height:64px !important;
        margin:0 0 0 -32px !important;
    }

    .om-svg{
        width:60px;
        height:60px;
    }

    .name{
        font-size:clamp(26px, 7vw, 36px);
    }

    .start h1{
        font-size:22px;
        margin-bottom:12px;
    }

    button.reveal-btn{
        padding:14px 28px;
        font-size:14px;
    }
}
</style>
</head>

<body>

<!-- Toran garland -->
<div class="toran" id="toran" aria-hidden="true">
    <div class="toran-rope"></div>
</div>

<!-- Corner paisleys -->
<div class="corner tl" aria-hidden="true">
<svg viewBox="0 0 80 80"><path d="M10 70 C10 30 40 10 55 25 C70 40 50 55 35 50 C50 60 65 45 58 30 C75 45 70 70 40 70 C25 70 10 70 10 70Z"/></svg>
</div>
<div class="corner tr" aria-hidden="true">
<svg viewBox="0 0 80 80"><path d="M10 70 C10 30 40 10 55 25 C70 40 50 55 35 50 C50 60 65 45 58 30 C75 45 70 70 40 70 C25 70 10 70 10 70Z"/></svg>
</div>
<div class="corner bl" aria-hidden="true">
<svg viewBox="0 0 80 80"><path d="M10 70 C10 30 40 10 55 25 C70 40 50 55 35 50 C50 60 65 45 58 30 C75 45 70 70 40 70 C25 70 10 70 10 70Z"/></svg>
</div>
<div class="corner br" aria-hidden="true">
<svg viewBox="0 0 80 80"><path d="M10 70 C10 30 40 10 55 25 C70 40 50 55 35 50 C50 60 65 45 58 30 C75 45 70 70 40 70 C25 70 10 70 10 70Z"/></svg>
</div>

<!-- Side Bala Ganesh idols -->
<!-- <div class="side-ganesh left" aria-hidden="true">
    <img src="bala-ganesh.png" alt="">
</div>
<div class="side-ganesh right" aria-hidden="true">
    <img src="bala-ganesh.png" alt="">
</div> -->

<div class="diya-field" id="diyaField" aria-hidden="true"></div>

<div class="start-screen" id="startScreen">
    <img class="ganesh-img" id="ganeshImg" src="bala-ganesh.png" alt="Bala Ganesh">
    <div class="start" id="start">
        <span class="hearts">✦ ✦ ✦</span>
        <h1>Do you want to know<br>my Chinnodu name?</h1>
        <button class="reveal-btn" onclick="revealName()">Reveal the Name</button>
    </div>
</div>

<div class="reveal" id="reveal">
    <div class="om-wrap" id="omWrap">
        <div class="om-glow"></div>
        <div class="om-ring"></div>
        <svg class="om-svg" viewBox="0 0 120 120" aria-label="Om" role="img">
            <defs>
                <linearGradient id="omGold" x1="20%" y1="10%" x2="80%" y2="90%">
                    <stop offset="0%" stop-color="#fff8e0"/>
                    <stop offset="35%" stop-color="#f0d060"/>
                    <stop offset="70%" stop-color="#e8c547"/>
                    <stop offset="100%" stop-color="#b8860b"/>
                </linearGradient>
            </defs>
            <circle cx="60" cy="60" r="34" fill="none" stroke="rgba(232,197,71,.45)" stroke-width="1.2"/>
            <circle cx="60" cy="60" r="30" fill="rgba(61,6,6,.5)"/>
            <g transform="translate(0, 8)">
                <text
                    x="60"
                    y="75"
                    text-anchor="middle"
                    font-family="'Noto Serif Devanagari', serif"
                    font-size="56"
                    font-weight="700"
                    fill="url(#omGold)"
                >ॐ</text>
            </g>
        </svg>
    </div>

    <div class="reveal-hero" id="revealHero">
        <div class="reveal-copy">
            <div class="title">With the Blessings of Lord Ganesha</div>

            <div class="name">హేత్విక్ శ్రీ తేజ</div>
            <div class="name-en">Hetvik Sree Teja</div>

            <div class="message">
                <span class="sparkles">
                    <span class="sparkle">✦</span>
                    Welcome Little Prince
                    <span class="sparkle">✦</span>
                </span>
                <p class="meaning">Hetvik means a loving heart with wisdom and divine blessings</p>
            </div>

            <div class="divider"></div>

            <div class="mother">
                <span class="heart">⚜️</span>
                Son of Teja
                <span class="heart">⚜️</span>
            </div>
        </div>
    </div>
</div>

<audio id="bgMusic" preload="auto" loop>
    <source src="krishna.mp3" type="audio/mpeg">
</audio>

<button id="musicToggle" class="music-toggle" type="button" aria-label="Mute music">
    <svg class="icon-on" viewBox="0 0 24 24" aria-hidden="true">
        <path class="spk" d="M3 9v6h4l5 5V4L7 9H3z"/>
        <path d="M16 8.5a4.5 4.5 0 0 1 0 7"/>
        <path d="M18.5 6a7.5 7.5 0 0 1 0 12"/>
    </svg>
    <svg class="icon-off" viewBox="0 0 24 24" aria-hidden="true">
        <path class="spk" d="M3 9v6h4l5 5V4L7 9H3z"/>
        <path d="M17 9l5 5M22 9l-5 5"/>
    </svg>
</button>

<script>
const bgMusic = document.getElementById("bgMusic");
const musicBtn = document.getElementById("musicToggle");
let musicPlaying = false;

/* Build toran */
(function buildToran(){
    const toran = document.getElementById("toran");
    const count = Math.min(36, Math.floor(window.innerWidth / 22));
    for(let i = 0; i < count; i++){
        if(i % 3 === 2){
            const bead = document.createElement("div");
            bead.className = "marigold-bead";
            toran.appendChild(bead);
        } else {
            const leaf = document.createElement("div");
            leaf.className = "leaf";
            toran.appendChild(leaf);
        }
    }
})();

function startMusic(){
    bgMusic.play().then(()=>{
        musicPlaying = true;
        musicBtn.classList.remove("is-muted");
        musicBtn.setAttribute("aria-label", "Mute music");
    }).catch(err => console.log(err));
}

function stopMusic(){
    bgMusic.pause();
    musicPlaying = false;
    musicBtn.classList.add("is-muted");
    musicBtn.setAttribute("aria-label", "Play music");
}

function spawnDiyas(){
    const field = document.getElementById("diyaField");
    for(let i = 0; i < 2; i++){
        const d = document.createElement("div");
        d.className = "diya";
        d.innerHTML = '<div class="diya-flame"></div><div class="diya-bowl"></div>';
        d.style.left = (12 + i * 22 + Math.random() * 8) + "%";
        d.style.animationDuration = (14 + Math.random() * 6) + "s";
        d.style.animationDelay = (i * 2.2) + "s";
        field.appendChild(d);
    }
}

function spawnPetals(){
    const layer = document.createElement("div");
    layer.id = "petalLayer";
    layer.style.cssText = "position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:2;overflow:hidden;";
    document.body.appendChild(layer);

    for(let i = 0; i < 8; i++){
        const p = document.createElement("div");
        p.className = "petal";
        p.style.left = Math.random() * 100 + "%";
        p.style.animationDuration = (8 + Math.random() * 7) + "s";
        p.style.animationDelay = (Math.random() * 5) + "s";
        const size = 12 + (i % 4) * 3;
        p.style.width = size + "px";
        p.style.height = (size + 4) + "px";
        layer.appendChild(p);
    }
}

function revealName(){
    const startScreen = document.getElementById("startScreen");
    const ganeshImg = document.getElementById("ganeshImg");
    const revealHero = document.getElementById("revealHero");

    // Transparent Ganesh behind the text
    revealHero.insertBefore(ganeshImg, revealHero.firstChild);
    document.body.classList.add("is-revealed");
    startScreen.classList.add("is-hidden");

    const reveal = document.getElementById("reveal");
    reveal.classList.add("show");
    musicBtn.classList.add("visible");
    startMusic();
    spawnPetals();
    spawnDiyas();
}

musicBtn.addEventListener("click", ()=>{
    if(musicPlaying) stopMusic();
    else startMusic();
});
</script>

</body>
</html>
