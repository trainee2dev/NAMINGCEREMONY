<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chinnodu Name Reveal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Noto+Serif+Devanagari:wght@600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --maroon:#5c0a0a;
    --deep:#3d0606;
    --saffron:#e07a1f;
    --marigold:#f0a020;
    --gold:#e8c547;
    --ivory:#fff4e0;
    --cream:#ffe8c2;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    color:var(--ivory);
    font-family:"Cormorant Garamond",serif;
    background:
        radial-gradient(ellipse 80% 60% at 50% 40%, rgba(224,122,31,.35) 0%, transparent 55%),
        radial-gradient(ellipse 50% 40% at 20% 80%, rgba(92,10,10,.5) 0%, transparent 50%),
        radial-gradient(ellipse 50% 40% at 85% 15%, rgba(240,160,32,.25) 0%, transparent 45%),
        linear-gradient(160deg, #2a0505 0%, #6b1010 35%, #a84810 70%, #c47820 100%);
}

/* Subtle rangoli dots (static — animating background-position causes jank) */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background-image:
        radial-gradient(circle, rgba(232,197,71,.18) 1.5px, transparent 1.5px);
    background-size:28px 28px;
    pointer-events:none;
    z-index:0;
}

/* —— Toran (mango leaf garland) —— */
.toran{
    position:fixed;
    top:0;
    left:0;
    right:0;
    height:70px;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    gap:2px;
    z-index:5;
    pointer-events:none;
    padding-top:4px;
}

.toran-rope{
    position:absolute;
    top:10px;
    left:5%;
    right:5%;
    height:4px;
    background:linear-gradient(90deg, transparent, var(--gold), var(--marigold), var(--gold), transparent);
    border-radius:2px;
    box-shadow:0 1px 6px rgba(232,197,71,.5);
}

.leaf{
    width:22px;
    height:36px;
    background:linear-gradient(180deg, #2d6a2d 0%, #1a4a1a 100%);
    border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;
    transform-origin:top center;
    position:relative;
    margin-top:8px;
}

.leaf::after{
    content:"";
    position:absolute;
    top:4px;
    left:50%;
    width:1.5px;
    height:70%;
    background:rgba(255,255,200,.25);
    transform:translateX(-50%);
}

/* Only a few leaves sway — keeps motion light */
.leaf:nth-child(6n){
    animation:leafSway 4s ease-in-out infinite;
}

.leaf:nth-child(even){
    background:linear-gradient(180deg, #3a8a3a 0%, #226022 100%);
}

@keyframes leafSway{
    0%,100%{ transform:rotate(-6deg); }
    50%{ transform:rotate(6deg); }
}

.marigold-bead{
    width:14px;
    height:14px;
    border-radius:50%;
    background:radial-gradient(circle at 35% 35%, #ffd060, #e07a1f 55%, #b85010);
    margin-top:6px;
}

/* —— Floating diyas —— */
.diya-field{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:1;
    overflow:hidden;
}

.diya{
    position:absolute;
    bottom:-20px;
    width:28px;
    height:18px;
    opacity:0;
    animation:diyaRise 12s ease-in infinite;
}

.diya-bowl{
    position:absolute;
    bottom:0;
    left:0;
    right:0;
    height:10px;
    background:linear-gradient(180deg, #c47820, #8b4510);
    border-radius:0 0 50% 50% / 0 0 100% 100%;
    box-shadow:0 2px 6px rgba(0,0,0,.3);
}

.diya-flame{
    position:absolute;
    bottom:8px;
    left:50%;
    width:8px;
    height:16px;
    margin-left:-4px;
    background:radial-gradient(ellipse at 50% 80%, #fff8e0 0%, #ffd060 30%, #ff6b00 70%, transparent 100%);
    border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;
    animation:flameFlicker 1.2s ease-in-out infinite alternate;
}

@keyframes flameFlicker{
    from{ transform:scale3d(1,1,1); opacity:.85; }
    to{ transform:scale3d(.9,1.12,1); opacity:1; }
}

@keyframes diyaRise{
    0%{
        opacity:0;
        transform:translate3d(0,0,0) scale(.6);
    }
    10%{ opacity:.8; }
    85%{ opacity:.65; }
    100%{
        opacity:0;
        transform:translate3d(0,-110vh,0) scale(1);
    }
}

/* —— Marigold petals —— */
.petal{
    position:absolute;
    top:-40px;
    width:16px;
    height:20px;
    background:radial-gradient(ellipse at 40% 40%, #ffd060, #e07a1f 60%, #c45010);
    border-radius:50% 50% 50% 0;
    opacity:.85;
    z-index:2;
    pointer-events:none;
    animation:petalFall linear infinite;
    will-change:transform, opacity;
    backface-visibility:hidden;
}

@keyframes petalFall{
    0%{
        transform:translate3d(0,0,0) rotate(0deg);
        opacity:0;
    }
    10%{ opacity:.9; }
    100%{
        transform:translate3d(30px,110vh,0) rotate(360deg);
        opacity:.25;
    }
}

/* —— Start screen —— */
.start{
    text-align:center;
    position:relative;
    z-index:10;
    animation:fadeIn .8s ease;
}

.start h1{
    font-family:"Cinzel",serif;
    font-size:clamp(22px, 4vw, 34px);
    font-weight:500;
    color:var(--cream);
    margin-bottom:36px;
    letter-spacing:.04em;
    text-shadow:0 2px 20px rgba(0,0,0,.4);
    line-height:1.4;
}

.start .hearts{
    display:block;
    font-size:18px;
    color:var(--marigold);
    margin-bottom:12px;
    letter-spacing:8px;
    animation:heartBeat 1.6s ease-in-out infinite;
}

@keyframes heartBeat{
    0%,100%{ transform:scale(1); opacity:.7; }
    50%{ transform:scale(1.1); opacity:1; }
}

button.reveal-btn{
    padding:16px 40px;
    border:1.5px solid var(--gold);
    border-radius:4px;
    font-family:"Cinzel",serif;
    font-size:16px;
    letter-spacing:.12em;
    background:linear-gradient(180deg, var(--gold) 0%, var(--saffron) 100%);
    color:var(--deep);
    font-weight:700;
    cursor:pointer;
    box-shadow:
        0 4px 0 #8b4510,
        0 8px 24px rgba(0,0,0,.35);
    transition:transform .2s, box-shadow .2s;
    position:relative;
    overflow:hidden;
}

button.reveal-btn::after{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(105deg, transparent 40%, rgba(255,255,255,.35) 50%, transparent 60%);
    transform:translateX(-100%);
    animation:shimmer 3s ease-in-out infinite;
}

@keyframes shimmer{
    0%,60%{ transform:translateX(-100%); }
    100%{ transform:translateX(100%); }
}

button.reveal-btn:hover{
    transform:translateY(-2px);
    box-shadow:
        0 6px 0 #8b4510,
        0 12px 28px rgba(0,0,0,.4);
}

button.reveal-btn:active{
    transform:translateY(2px);
    box-shadow:0 2px 0 #8b4510, 0 4px 12px rgba(0,0,0,.3);
}

@keyframes fadeIn{
    from{ opacity:0; transform:translateY(12px); }
    to{ opacity:1; transform:translateY(0); }
}

/* —— Reveal —— */
.reveal{
    display:none;
    text-align:center;
    position:relative;
    z-index:10;
    padding:clamp(28px, 5vw, 48px) clamp(24px, 6vw, 56px);
    max-width:640px;
    width:90%;
}

.reveal.show{
    display:block;
    animation:cardReveal 1s cubic-bezier(.22,1,.36,1) forwards;
}

@keyframes cardReveal{
    from{
        opacity:0;
        transform:scale(.88) translateY(24px);
    }
    to{
        opacity:1;
        transform:scale(1) translateY(0);
    }
}

/* Mandala behind content — slow spin via inner SVG (GPU-friendly) */
.mandala{
    position:absolute;
    top:50%;
    left:50%;
    width:min(520px, 90vw);
    height:min(520px, 90vw);
    transform:translate(-50%, -50%);
    pointer-events:none;
    z-index:-1;
    opacity:.18;
}

.mandala svg{
    width:100%;
    height:100%;
    animation:mandalaSpin 90s linear infinite;
    will-change:transform;
}

@keyframes mandalaSpin{
    from{ transform:rotate(0deg); }
    to{ transform:rotate(360deg); }
}

.om-wrap{
    position:relative;
    display:inline-flex;
    justify-content:center;
    align-items:center;
    width:120px;
    height:120px;
    margin:12px auto 4px;
    opacity:0;
    animation:riseIn .8s .2s ease forwards;
}

.om-glow{
    position:absolute;
    inset:8px;
    border-radius:50%;
    background:radial-gradient(circle,
        rgba(255,220,120,.65) 0%,
        rgba(224,122,31,.25) 45%,
        transparent 70%);
    animation:omPulse 3.5s ease-in-out infinite;
    z-index:0;
    will-change:transform, opacity;
}

.om-ring{
    position:absolute;
    inset:0;
    border-radius:50%;
    border:1.5px solid rgba(232,197,71,.35);
    animation:omExpand 4s ease-out infinite;
}

.om-svg{
    position:relative;
    z-index:2;
    width:100px;
    height:100px;
    /* soft gold glow without animated filter */
    filter:drop-shadow(0 2px 8px rgba(200,140,20,.45));
}

.om-svg .lotus-petal{
    fill:rgba(232,197,71,.22);
    stroke:rgba(232,197,71,.5);
    stroke-width:1;
}

@keyframes omPulse{
    0%,100%{ transform:scale(.94); opacity:.65; }
    50%{ transform:scale(1.06); opacity:1; }
}

@keyframes omExpand{
    0%{ transform:scale(.9); opacity:.6; }
    100%{ transform:scale(1.35); opacity:0; }
}

.title{
    font-family:"Cormorant Garamond",serif;
    font-size:clamp(16px, 2.5vw, 20px);
    font-style:italic;
    color:var(--gold);
    letter-spacing:.06em;
    margin-top:6px;
    opacity:0;
    animation:riseIn .8s .4s ease forwards;
}

.name{
    font-family:"Cinzel",serif;
    font-size:clamp(36px, 8vw, 58px);
    font-weight:700;
    margin-top:22px;
    color:var(--ivory);
    letter-spacing:.03em;
    line-height:1.15;
    text-shadow:
        0 2px 4px rgba(0,0,0,.35),
        0 0 40px rgba(224,122,31,.45);
    opacity:0;
    animation:nameReveal 1.2s .6s cubic-bezier(.22,1,.36,1) forwards;
}

@keyframes nameReveal{
    from{
        opacity:0;
        transform:scale(.7);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

.message{
    font-size:clamp(18px, 3vw, 24px);
    margin-top:22px;
    color:var(--cream);
    opacity:0;
    animation:riseIn .8s .9s ease forwards;
}

.sparkles{
    display:inline-flex;
    gap:10px;
    align-items:center;
    color:var(--gold);
    font-size:.85em;
}

.sparkle{
    display:inline-block;
    animation:twinkle 1.8s ease-in-out infinite;
}

.sparkle:nth-child(3){ animation-delay:.6s; }

@keyframes twinkle{
    0%,100%{ opacity:.4; transform:scale(.8) rotate(0deg); }
    50%{ opacity:1; transform:scale(1.15) rotate(15deg); }
}

.meaning{
    font-size:clamp(14px, 2.2vw, 17px);
    margin-top:14px;
    color:rgba(255,244,224,.8);
    font-style:italic;
    line-height:1.5;
    max-width:420px;
    margin-left:auto;
    margin-right:auto;
}

.divider{
    width:120px;
    height:1px;
    margin:22px auto 0;
    background:linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity:0;
    animation:riseIn .8s 1.1s ease forwards;
}

.mother{
    font-family:"Cinzel",serif;
    font-size:clamp(16px, 2.8vw, 22px);
    margin-top:16px;
    color:var(--gold);
    letter-spacing:.08em;
    opacity:0;
    animation:riseIn .8s 1.2s ease forwards;
}

.mother .heart{
    display:inline-block;
    color:#e05050;
    margin:0 8px;
    animation:heartBeat 1.6s ease-in-out infinite;
}

@keyframes riseIn{
    from{
        opacity:0;
        transform:translateY(16px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.music-toggle{
    display:none;
    position:fixed;
    top:78px;
    right:18px;
    padding:10px 18px;
    border:1px solid rgba(232,197,71,.5);
    border-radius:4px;
    background:rgba(61,6,6,.75);
    backdrop-filter:blur(8px);
    color:var(--gold);
    font-family:"Cinzel",serif;
    font-size:12px;
    letter-spacing:.1em;
    font-weight:500;
    cursor:pointer;
    z-index:9999;
    transition:background .25s, transform .2s;
}

.music-toggle:hover{
    background:rgba(92,10,10,.9);
    transform:translateY(-1px);
}

.music-toggle.visible{
    display:block;
    animation:fadeIn .5s ease;
}

/* —— Center Bala Ganesh (soft background shade) —— */
.ganesh-center{
    position:fixed;
    top:52%;
    left:50%;
    transform:translate(-50%, -50%);
    width:min(480px, 82vw);
    z-index:1;
    pointer-events:none;
    opacity:.22;
}

.ganesh-center img{
    width:100%;
    height:auto;
    display:block;
    filter:drop-shadow(0 0 28px rgba(232,197,71,.3));
}

/* —— Side Bala Ganesh idols —— */
.side-ganesh{
    position:fixed;
    top:50%;
    transform:translateY(-50%);
    z-index:3;
    pointer-events:none;
    width:clamp(90px, 16vw, 150px);
}

.side-ganesh.left{ left:clamp(6px, 2.5vw, 24px); }
.side-ganesh.right{
    right:clamp(6px, 2.5vw, 24px);
    transform:translateY(-50%) scaleX(-1);
}

.side-ganesh img{
    width:100%;
    height:auto;
    display:block;
    filter:drop-shadow(0 4px 16px rgba(0,0,0,.4));
}

/* Corner paisleys */
.corner{
    position:fixed;
    width:80px;
    height:80px;
    opacity:.35;
    z-index:3;
    pointer-events:none;
}

.corner svg{ width:100%; height:100%; fill:var(--gold); }

.corner.tl{ top:60px; left:12px; }
.corner.tr{ top:60px; right:12px; transform:scaleX(-1); }
.corner.bl{ bottom:12px; left:12px; transform:scaleY(-1); }
.corner.br{ bottom:12px; right:12px; transform:scale(-1); }

@media (max-width:500px){
    .toran{ height:50px; }
    .leaf{ width:14px; height:24px; }
    .marigold-bead{ width:10px; height:10px; }
    .corner{ width:48px; height:48px; }
    .music-toggle{ top:58px; right:10px; padding:8px 12px; font-size:11px; }
    .side-ganesh{ width:70px; }
    .ganesh-center{ width:min(320px, 85vw); opacity:.18; }
}
</style>
</head>

<body>

<!-- Toran garland -->
<div class="toran" id="toran" aria-hidden="true">
    <div class="toran-rope"></div>
</div>

<!-- Corner paisleys -->
<div class="corner tl" aria-hidden="true">
<svg viewBox="0 0 80 80"><path d="M10 70 C10 30 40 10 55 25 C70 40 50 55 35 50 C50 60 65 45 58 30 C75 45 70 70 40 70 C25 70 10 70 10 70Z"/></svg>
</div>
<div class="corner tr" aria-hidden="true">
<svg viewBox="0 0 80 80"><path d="M10 70 C10 30 40 10 55 25 C70 40 50 55 35 50 C50 60 65 45 58 30 C75 45 70 70 40 70 C25 70 10 70 10 70Z"/></svg>
</div>
<div class="corner bl" aria-hidden="true">
<svg viewBox="0 0 80 80"><path d="M10 70 C10 30 40 10 55 25 C70 40 50 55 35 50 C50 60 65 45 58 30 C75 45 70 70 40 70 C25 70 10 70 10 70Z"/></svg>
</div>
<div class="corner br" aria-hidden="true">
<svg viewBox="0 0 80 80"><path d="M10 70 C10 30 40 10 55 25 C70 40 50 55 35 50 C50 60 65 45 58 30 C75 45 70 70 40 70 C25 70 10 70 10 70Z"/></svg>
</div>

<!-- Center Bala Ganesh shade -->
<div class="ganesh-center" aria-hidden="true">
    <img src="bala-ganesh.png" alt="">
</div>

<!-- Side Bala Ganesh idols -->
<!-- <div class="side-ganesh left" aria-hidden="true">
    <img src="bala-ganesh.png" alt="">
</div>
<div class="side-ganesh right" aria-hidden="true">
    <img src="bala-ganesh.png" alt="">
</div> -->

<div class="diya-field" id="diyaField" aria-hidden="true"></div>

<div class="start" id="start">
    <span class="hearts">✦ ✦ ✦</span>
    <h1>Do you want to know<br>my Chinnodu name?</h1>
    <button class="reveal-btn" onclick="revealName()">Reveal the Name</button>
</div>

<div class="reveal" id="reveal">
    <div class="mandala" aria-hidden="true">
        <svg viewBox="0 0 200 200">
            <circle cx="100" cy="100" r="95" fill="none" stroke="#e8c547" stroke-width=".6"/>
            <circle cx="100" cy="100" r="80" fill="none" stroke="#e8c547" stroke-width=".4"/>
            <circle cx="100" cy="100" r="55" fill="none" stroke="#e8c547" stroke-width=".5"/>
            <circle cx="100" cy="100" r="30" fill="none" stroke="#e8c547" stroke-width=".6"/>
            <g stroke="#e8c547" stroke-width=".5" fill="none">
                <ellipse cx="100" cy="100" rx="90" ry="35"/>
                <ellipse cx="100" cy="100" rx="90" ry="35" transform="rotate(45 100 100)"/>
                <ellipse cx="100" cy="100" rx="90" ry="35" transform="rotate(90 100 100)"/>
                <ellipse cx="100" cy="100" rx="90" ry="35" transform="rotate(135 100 100)"/>
            </g>
            <g fill="#e8c547">
                <circle cx="100" cy="10" r="3"/>
                <circle cx="100" cy="190" r="3"/>
                <circle cx="10" cy="100" r="3"/>
                <circle cx="190" cy="100" r="3"/>
                <circle cx="163" cy="37" r="2.5"/>
                <circle cx="37" cy="37" r="2.5"/>
                <circle cx="163" cy="163" r="2.5"/>
                <circle cx="37" cy="163" r="2.5"/>
            </g>
        </svg>
    </div>

    <div class="om-wrap">
        <div class="om-glow"></div>
        <div class="om-ring"></div>
        <svg class="om-svg" viewBox="0 0 120 120" aria-label="Om" role="img">
            <defs>
                <linearGradient id="omGold" x1="20%" y1="10%" x2="80%" y2="90%">
                    <stop offset="0%" stop-color="#fff8e0"/>
                    <stop offset="35%" stop-color="#f0d060"/>
                    <stop offset="70%" stop-color="#e8c547"/>
                    <stop offset="100%" stop-color="#b8860b"/>
                </linearGradient>
                <radialGradient id="omCore" cx="50%" cy="45%" r="50%">
                    <stop offset="0%" stop-color="#fff4e0"/>
                    <stop offset="100%" stop-color="#d4a017"/>
                </radialGradient>
            </defs>
            <!-- Soft lotus ring -->
            <g>
                <ellipse class="lotus-petal" cx="60" cy="18" rx="10" ry="16"/>
                <ellipse class="lotus-petal" cx="60" cy="102" rx="10" ry="16"/>
                <ellipse class="lotus-petal" cx="18" cy="60" rx="16" ry="10"/>
                <ellipse class="lotus-petal" cx="102" cy="60" rx="16" ry="10"/>
                <ellipse class="lotus-petal" cx="30" cy="30" rx="9" ry="15" transform="rotate(-45 30 30)"/>
                <ellipse class="lotus-petal" cx="90" cy="30" rx="9" ry="15" transform="rotate(45 90 30)"/>
                <ellipse class="lotus-petal" cx="30" cy="90" rx="9" ry="15" transform="rotate(45 30 90)"/>
                <ellipse class="lotus-petal" cx="90" cy="90" rx="9" ry="15" transform="rotate(-45 90 90)"/>
            </g>
            <circle cx="60" cy="60" r="34" fill="none" stroke="rgba(232,197,71,.4)" stroke-width="1.2"/>
            <circle cx="60" cy="60" r="30" fill="rgba(61,6,6,.35)"/>
            <!-- Sacred Om — shifted down for visual balance -->
            <g transform="translate(0, 8)">
                <text
                    x="60"
                    y="75"
                    text-anchor="middle"
                    font-family="'Noto Serif Devanagari', serif"
                    font-size="56"
                    font-weight="700"
                    fill="url(#omGold)"
                >ॐ</text>
            </g>
        </svg>
    </div>

    <div class="title">With the Blessings of Lord Ganesha</div>

    <div class="name">హేత్విక్ శ్రీ తేజ</div>

    <div class="message">
        <span class="sparkles">
            <span class="sparkle">✦</span>
            Welcome Little Prince
            <span class="sparkle">✦</span>
        </span>
        <p class="meaning">Hetvik means a loving heart with wisdom and divine blessings</p>
    </div>

    <div class="divider"></div>

    <div class="mother">
        <span class="heart">⚜️</span>
        Son of Teja
        <span class="heart">⚜️</span>
    </div>
</div>

<audio id="bgMusic" preload="auto" loop>
    <source src="krishna.mp3" type="audio/mpeg">
</audio>

<button id="musicToggle" class="music-toggle" type="button">Music On</button>

<script>
const bgMusic = document.getElementById("bgMusic");
const musicBtn = document.getElementById("musicToggle");
let musicPlaying = false;

/* Build toran */
(function buildToran(){
    const toran = document.getElementById("toran");
    const count = Math.min(36, Math.floor(window.innerWidth / 22));
    for(let i = 0; i < count; i++){
        if(i % 3 === 2){
            const bead = document.createElement("div");
            bead.className = "marigold-bead";
            toran.appendChild(bead);
        } else {
            const leaf = document.createElement("div");
            leaf.className = "leaf";
            toran.appendChild(leaf);
        }
    }
})();

function startMusic(){
    bgMusic.play().then(()=>{
        musicPlaying = true;
        musicBtn.textContent = "Music On";
    }).catch(err => console.log(err));
}

function stopMusic(){
    bgMusic.pause();
    musicPlaying = false;
    musicBtn.textContent = "Music Off";
}

function spawnDiyas(){
    const field = document.getElementById("diyaField");
    for(let i = 0; i < 4; i++){
        const d = document.createElement("div");
        d.className = "diya";
        d.innerHTML = '<div class="diya-flame"></div><div class="diya-bowl"></div>';
        d.style.left = (12 + i * 22 + Math.random() * 8) + "%";
        d.style.animationDuration = (14 + Math.random() * 6) + "s";
        d.style.animationDelay = (i * 2.2) + "s";
        field.appendChild(d);
    }
}

function spawnPetals(){
    const layer = document.createElement("div");
    layer.id = "petalLayer";
    layer.style.cssText = "position:fixed;inset:0;pointer-events:none;z-index:2;overflow:hidden;";
    document.body.appendChild(layer);

    for(let i = 0; i < 14; i++){
        const p = document.createElement("div");
        p.className = "petal";
        p.style.left = Math.random() * 100 + "vw";
        p.style.animationDuration = (8 + Math.random() * 7) + "s";
        p.style.animationDelay = (Math.random() * 5) + "s";
        const size = 12 + (i % 4) * 3;
        p.style.width = size + "px";
        p.style.height = (size + 4) + "px";
        layer.appendChild(p);
    }
}

function revealName(){
    document.getElementById("start").style.display = "none";
    const reveal = document.getElementById("reveal");
    reveal.classList.add("show");
    musicBtn.classList.add("visible");
    startMusic();
    spawnPetals();
    spawnDiyas();
}

musicBtn.addEventListener("click", ()=>{
    if(musicPlaying) stopMusic();
    else startMusic();
});
</script>

</body>
</html>
