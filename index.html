<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chinnodu Name Reveal</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Georgia",serif;
}

body{

    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    overflow:hidden;

    background:
    linear-gradient(135deg,#8B0000,#FF8C00,#FFD700);

    color:white;

}

/* Start Screen */

.start{

    text-align:center;

}

.start h1{

    font-size:35px;

    color:#fff8dc;

    margin-bottom:30px;

}

button{

    padding:18px 35px;

    border:none;

    border-radius:40px;

    font-size:20px;

    background:#ffd700;

    color:#8B0000;

    font-weight:bold;

    cursor:pointer;

    box-shadow:0 0 25px gold;

}

/* Reveal Box */

.reveal{

    display:none;

    text-align:center;

    background:rgba(255,255,255,.15);

    padding:40px;

    border:3px solid gold;

    border-radius:25px;

    box-shadow:0 0 40px gold;

}

.om{

    position:relative;

    display:inline-flex;

    justify-content:center;

    align-items:center;

    width:110px;

    height:110px;

    margin:0 auto;

    font-size:60px;

    z-index:2;

}

.om::before{

    content:"";

    position:absolute;

    width:90px;

    height:90px;

    border-radius:50%;

    background:radial-gradient(circle,
        rgba(255,200,80,.95) 0%,
        rgba(255,170,0,.65) 40%,
        rgba(255,140,0,.35) 65%,
        rgba(255,140,0,0) 100%);

    filter:blur(6px);

    animation:omGlow 2.8s ease-in-out infinite;

    z-index:-1;

}

.om::after{

    content:"";

    position:absolute;

    width:105px;

    height:105px;

    border-radius:50%;

    border:2px solid rgba(255,215,0,.35);

    animation:omRing 3s linear infinite;

    z-index:-2;

}

@keyframes omGlow{

    0%{

        transform:scale(.95);

        opacity:.75;

    }

    50%{

        transform:scale(1.12);

        opacity:1;

    }

    100%{

        transform:scale(.95);

        opacity:.75;

    }

}

@keyframes omRing{

    0%{

        transform:scale(.9);

        opacity:.8;

    }

    100%{

        transform:scale(1.25);

        opacity:0;

    }

}

.title{

    font-size:25px;

    color:#ffe082;

    margin-top:15px;

}

.name{

    font-size:65px;

    font-weight:bold;

    margin-top:30px;

    color:white;

    text-shadow:
    0 0 10px gold,
    0 0 30px orange,
    0 0 60px gold;

    animation:zoom 2s;

}

.message{

    font-size:25px;

    margin-top:25px;

    color:#fff3cd;

}

.mother{

    font-size:30px;

    margin-top:20px;

    color:#FFD700;

}

.flower{

    position:absolute;

    top:-40px;

    font-size:30px;

    animation:fall linear infinite;

}

.music-toggle{

    display:none;

    position:fixed;

    top:20px;

    right:20px;

    padding:12px 20px;

    border:none;

    border-radius:30px;

    background:#FFD700;

    color:#8B0000;

    font-size:16px;

    font-weight:bold;

    cursor:pointer;

    box-shadow:0 0 15px gold;

    z-index:9999;

    transition:.3s;

}

.music-toggle:hover{

    transform:scale(1.05);

}

@keyframes zoom{

from{

opacity:0;

transform:scale(.2);

}

to{

opacity:1;

transform:scale(1);

}

}

@keyframes fall{

to{

transform:translateY(110vh) rotate(360deg);

}

}

</style>

</head>

<body>

<div class="start" id="start">

<h1>
❤️ Do you want to know my Chinnodu name? ❤️
</h1>

<button onclick="revealName()">
Click Here ✨
</button>

</div>

<div class="reveal" id="reveal">

<div class="om">
🕉️
</div>

<div class="title">
With the Blessings of Lord Ganesha
</div>

<div class="name">
Hetvik Sri Teja
</div>

<div class="message">

✨ Welcome Little Prince ✨

<br><br>

Hetvik means a loving heart with wisdom and divine blessings

</div>

<div class="mother">
❤️ Son of Teja ❤️
</div>

</div>

<!-- Background Music -->

<audio id="bgMusic" preload="auto" loop>

    <source src="krishna.mp3" type="audio/mpeg">

</audio>

<button id="musicToggle" class="music-toggle">

🔊 Music On

</button>

<script>

const bgMusic = document.getElementById("bgMusic");

const musicBtn = document.getElementById("musicToggle");

let musicPlaying = false;

function startMusic(){

    bgMusic.play().then(()=>{

        musicPlaying=true;

        musicBtn.innerHTML="🔊 Music On";

    }).catch(err=>{

        console.log(err);

    });

}

function stopMusic(){

    bgMusic.pause();

    musicPlaying=false;

    musicBtn.innerHTML="🔇 Music Off";

}

function revealName(){

    document.getElementById("start").style.display="none";

    document.getElementById("reveal").style.display="block";

    musicBtn.style.display="block";

    startMusic();

    let flowers=["🌸","🌺","🌼","🌷"];

    for(let i=0;i<50;i++){

        let f=document.createElement("div");

        f.className="flower";

        f.innerHTML=flowers[Math.floor(Math.random()*flowers.length)];

        f.style.left=Math.random()*100+"vw";

        f.style.animationDuration=(5+Math.random()*8)+"s";

        document.body.appendChild(f);

    }

}

musicBtn.addEventListener("click",()=>{

    if(musicPlaying){

        stopMusic();

    }else{

        startMusic();

    }

});

</script>

</body>

</html>
